services:
  - type: web
    name: orbit-architect-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-architect-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITLAB_TOKEN
        sync: false
      - key: GITLAB_URL
        value: https://gitlab.com
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITLAB_CLIENT_ID
        sync: false
      - key: GITLAB_CLIENT_SECRET
        sync: false
    plan: free

databases:
  - name: orbit-architect-db
    plan: free
    databaseName: orbit_architect
    user: orbit_user
